<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turon Zakas - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .login-card { max-width: 400px; margin: 100px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; }
        .btn-primary { background: #4e73df; border: none; padding: 12px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <i class="fas fa-crown fa-3x mb-3 text-primary"></i>
        <h2>Admin Login</h2>
        <p class="text-muted">Turon Zakas Ultimate System</p>
        <div class="mt-4">
            <input type="text" id="username" class="form-control mb-3" placeholder="Login">
            <input type="password" id="password" class="form-control mb-3" placeholder="Parol">
            <button class="btn btn-primary w-100" onclick="login()">Kirish</button>
        </div>
    </div>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('admin_token', 'true');
                window.location.href = 'dashboard.html';
            } else alert('Login yoki parol xato!');
        }
    </script>
</body>
</html>
